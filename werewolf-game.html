<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐺 Ma Sói Online - Werewolf Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #e94560;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 3em;
            color: #e94560;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
            margin-bottom: 10px;
        }

        header p {
            color: #aaa;
            font-size: 1.2em;
        }

        .game-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .section-title {
            font-size: 1.8em;
            color: #e94560;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Setup Section */
        .setup-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .role-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .role-card:hover {
            transform: translateY(-5px);
            border-color: #e94560;
        }

        .role-card.selected {
            border-color: #4ade80;
            background: rgba(74, 222, 128, 0.2);
        }

        .role-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .role-name {
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 5px;
        }

        .role-count {
            color: #aaa;
            font-size: 0.9em;
        }

        .role-card.selected .role-count {
            color: #4ade80;
        }

        .player-slider {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
        }

        .player-slider input[type="range"] {
            flex: 1;
            height: 10px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            -webkit-appearance: none;
        }

        .player-slider input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            background: #e94560;
            cursor: pointer;
        }

        .player-count-display {
            font-size: 2em;
            font-weight: bold;
            color: #e94560;
            min-width: 80px;
            text-align: center;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.2em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn-primary {
            background: linear-gradient(135deg, #e94560 0%, #c23a51 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(233, 69, 96, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Game Board */
        .game-board {
            display: none;
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(233, 69, 96, 0.2);
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .phase-display {
            font-size: 1.5em;
            font-weight: bold;
        }

        .phase-display.night {
            color: #818cf8;
        }

        .phase-display.day {
            color: #fbbf24;
        }

        .day-counter {
            font-size: 1.3em;
            color: #aaa;
        }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .player-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid transparent;
            position: relative;
        }

        .player-card:hover {
            transform: translateY(-5px);
        }

        .player-card.alive {
            border-color: #4ade80;
        }

        .player-card.dead {
            border-color: #ef4444;
            opacity: 0.5;
        }

        .player-card.selected {
            border-color: #e94560;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.5);
        }

        .player-card.werewolf {
            border-color: #a855f7;
        }

        .player-avatar {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .player-name {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        .player-role {
            color: #aaa;
            font-size: 0.9em;
        }

        .player-status {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 1.5em;
        }

        /* Action Panel */
        .action-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
        }

        .action-title {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #e94560;
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Game Log */
        .game-log {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 30px;
        }

        .log-entry {
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 10px;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-time {
            color: #aaa;
            font-size: 0.8em;
            min-width: 60px;
        }

        .log-message {
            flex: 1;
        }

        .log-message.night {
            color: #818cf8;
        }

        .log-message.day {
            color: #fbbf24;
        }

        .log-message.death {
            color: #ef4444;
        }

        .log-message.win {
            color: #4ade80;
            font-weight: bold;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
            border: 2px solid #e94560;
        }

        .modal-title {
            font-size: 2em;
            color: #e94560;
            margin-bottom: 20px;
        }

        .modal-body {
            font-size: 1.2em;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .role-reveal {
            font-size: 3em;
            margin: 20px 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }

            .setup-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .players-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Animations */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .night-mode {
            animation: pulse 2s infinite;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🐺 Ma Sói Online</h1>
            <p>Werewolf - Trò chơi xã hội kinh điển</p>
        </header>

        <!-- Setup Section -->
        <div id="setupSection" class="game-section">
            <h2 class="section-title">⚙️ Thiết lập trò chơi</h2>
            
            <div class="player-slider">
                <span>Số người chơi:</span>
                <input type="range" id="playerCount" min="4" max="18" value="8">
                <span class="player-count-display" id="playerCountDisplay">8</span>
            </div>

            <div class="setup-grid" id="roleGrid">
                <!-- Roles will be generated by JS -->
            </div>

            <div style="text-align: center; margin-top: 30px;">
                <button class="btn btn-primary" id="startBtn" onclick="startGame()">🎮 Bắt đầu trò chơi</button>
            </div>
        </div>

        <!-- Game Board -->
        <div id="gameBoard" class="game-board">
            <div class="game-info">
                <div class="phase-display night" id="phaseDisplay">🌙 Đêm</div>
                <div class="day-counter" id="dayCounter">Ngày 1</div>
            </div>

            <div class="players-grid" id="playersGrid">
                <!-- Players will be generated by JS -->
            </div>

            <div class="action-panel" id="actionPanel">
                <h3 class="action-title" id="actionTitle">Chọn hành động</h3>
                <div class="action-buttons" id="actionButtons">
                    <!-- Action buttons will be generated by JS -->
                </div>
            </div>

            <div class="game-log" id="gameLog">
                <!-- Log entries will be added by JS -->
            </div>

            <div style="text-align: center; margin-top: 30px;">
                <button class="btn btn-secondary" onclick="resetGame()">🔄 Chơi lại</button>
            </div>
        </div>
    </div>

    <!-- Role Reveal Modal -->
    <div id="roleModal" class="modal">
        <div class="modal-content">
            <h2 class="modal-title">🎭 Vai trò của bạn</h2>
            <div class="role-reveal" id="roleReveal"></div>
            <div class="modal-body" id="roleDescription"></div>
            <button class="btn btn-primary" onclick="closeRoleModal()">Đã hiểu</button>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div id="gameOverModal" class="modal">
        <div class="modal-content">
            <h2 class="modal-title" id="winnerTitle">🏆 Trò chơi kết thúc</h2>
            <div class="role-reveal" id="winnerIcon"></div>
            <div class="modal-body" id="winnerMessage"></div>
            <button class="btn btn-primary" onclick="resetGame()">🔄 Chơi lại</button>
        </div>
    </div>

    <script>
        // Game Configuration
        const ROLES = {
            werewolf: { icon: '🐺', name: 'Ma Sói', count: 2, team: 'werewolf' },
            villager: { icon: '👨‍🌾', name: 'Dân Làng', count: 4, team: 'villager' },
            seer: { icon: '🔮', name: 'Thầy Tiên Tri', count: 1, team: 'villager' },
            hunter: { icon: '🏹', name: 'Thợ Săn', count: 1, team: 'villager' },
            witch: { icon: '🧙', name: 'Phù Thủy', count: 1, team: 'villager' },
            guard: { icon: '🛡️', name: 'Bảo Vệ', count: 1, team: 'villager' },
            cupid: { icon: '💘', name: 'Thần Tình Yêu', count: 1, team: 'neutral' },
            idiot: { icon: '🤡', name: 'Kẻ Ngốc', count: 1, team: 'villager' }
        };

        const ROLE_DESCRIPTIONS = {
            werewolf: 'Mỗi đêm, bạn và đồng đội chọn một người để giết. Hãy giấu kín thân phận!',
            villager: 'Bạn không có khả năng đặc biệt. Hãy dùng lý trí để tìm ra Ma Sói!',
            seer: 'Mỗi đêm, bạn có thể xem vai trò của một người chơi.',
            hunter: 'Khi chết, bạn có thể kéo theo một người khác.',
            witch: 'Bạn có 2 bình thuốc: cứu người và giết người. Mỗi bình chỉ dùng 1 lần.',
            guard: 'Mỗi đêm, bảo vệ một người khỏi bị Ma Sói giết.',
            cupid: 'Đêm đầu tiên, chọn 2 người thành đôi tình yêu. Họ thắng cùng nhau.',
            idiot: 'Khi bị vote ra, bạn được miễn chết nhưng mất quyền vote sau đó.'
        };

        // Game State
        let gameState = {
            players: [],
            roles: {},
            day: 1,
            phase: 'night', // 'night' or 'day'
            alive: [],
            selectedTarget: null,
            nightActions: {},
            witchPotions: { save: true, kill: true },
            guardLastProtect: null,
            log: []
        };

        // Initialize Setup
        function initSetup() {
            const playerCountSlider = document.getElementById('playerCount');
            const playerCountDisplay = document.getElementById('playerCountDisplay');
            
            playerCountSlider.addEventListener('input', (e) => {
                playerCountDisplay.textContent = e.target.value;
                updateRoleCounts();
            });

            updateRoleCounts();
        }

        function updateRoleCounts() {
            const playerCount = parseInt(document.getElementById('playerCount').value);
            const roleGrid = document.getElementById('roleGrid');
            roleGrid.innerHTML = '';

            // Calculate role distribution based on player count
            const roleDistribution = getRoleDistribution(playerCount);

            for (const [roleId, config] of Object.entries(ROLES)) {
                const count = roleDistribution[roleId] || 0;
                if (count > 0) {
                    const card = document.createElement('div');
                    card.className = 'role-card';
                    card.dataset.role = roleId;
                    card.innerHTML = `
                        <div class="role-icon">${config.icon}</div>
                        <div class="role-name">${config.name}</div>
                        <div class="role-count">Số lượng: <span id="count-${roleId}">${count}</span></div>
                    `;
                    roleGrid.appendChild(card);
                }
            }
        }

        function getRoleDistribution(playerCount) {
            const dist = { werewolf: 2, villager: 0 };
            let remaining = playerCount - 2;

            // Always have seer
            if (remaining > 0) {
                dist.seer = 1;
                remaining--;
            }

            // Add special roles based on count
            if (playerCount >= 6 && remaining > 0) {
                dist.witch = 1;
                remaining--;
            }
            if (playerCount >= 8 && remaining > 0) {
                dist.hunter = 1;
                remaining--;
            }
            if (playerCount >= 10 && remaining > 0) {
                dist.guard = 1;
                remaining--;
            }
            if (playerCount >= 12 && remaining > 0) {
                dist.cupid = 1;
                remaining--;
            }

            // Fill rest with villagers
            dist.villager = remaining;

            return dist;
        }

        // Start Game
        function startGame() {
            const playerCount = parseInt(document.getElementById('playerCount').value);
            const roleDistribution = getRoleDistribution(playerCount);

            // Create role pool
            let rolePool = [];
            for (const [roleId, count] of Object.entries(roleDistribution)) {
                for (let i = 0; i < count; i++) {
                    rolePool.push(roleId);
                }
            }

            // Shuffle roles
            rolePool = shuffleArray(rolePool);

            // Create players
            gameState.players = [];
            gameState.alive = [];
            for (let i = 0; i < playerCount; i++) {
                const role = rolePool[i];
                const player = {
                    id: i + 1,
                    name: `Người chơi ${i + 1}`,
                    role: role,
                    team: ROLES[role].team,
                    alive: true,
                    avatar: getRandomAvatar()
                };
                gameState.players.push(player);
                gameState.alive.push(i + 1);
            }

            // Show setup, hide game board
            document.getElementById('setupSection').style.display = 'none';
            document.getElementById('gameBoard').style.display = 'block';

            // Show each player their role (in a real game, this would be private)
            showRoleReveal(gameState.players[0]);

            // Start night phase
            startNight();

            addLog('Trò chơi bắt đầu! Ma Sói hãy chọn con mồi...', 'night');
        }

        function showRoleReveal(player) {
            const modal = document.getElementById('roleModal');
            const roleReveal = document.getElementById('roleReveal');
            const roleDescription = document.getElementById('roleDescription');

            roleReveal.textContent = ROLES[player.role].icon;
            roleDescription.textContent = `Bạn là ${ROLES[player.role].name}\n\n${ROLE_DESCRIPTIONS[player.role]}`;
            
            modal.style.display = 'flex';
        }

        function closeRoleModal() {
            document.getElementById('roleModal').style.display = 'none';
        }

        function startNight() {
            gameState.phase = 'night';
            gameState.selectedTarget = null;
            gameState.nightActions = {};

            updatePhaseDisplay();
            renderPlayers();
            updateActionPanel();

            addLog(`--- Đêm ${gameState.day} bắt đầu ---`, 'night');
        }

        function startDay() {
            gameState.phase = 'day';
            gameState.selectedTarget = null;

            // Process night actions
            processNightActions();

            updatePhaseDisplay();
            renderPlayers();
            updateActionPanel();

            addLog(`--- Ngày ${gameState.day} bắt đầu ---`, 'day');

            // Check win condition
            if (checkWinCondition()) {
                return;
            }

            // Voting phase
            setTimeout(() => {
                addLog('Hãy thảo luận và vote để tìm ra Ma Sói!', 'day');
            }, 1000);
        }

        function processNightActions() {
            const actions = gameState.nightActions;
            let deaths = [];

            // Werewolf kill
            if (actions.werewolf) {
                const target = actions.werewolf;
                const player = gameState.players.find(p => p.id === target);
                
                // Check if guard protected
                if (actions.guard !== target) {
                    // Check if witch saves
                    if (actions.witchSave === target) {
                        addLog(`Phù Thủy đã cứu ${player.name}!`, 'night');
                        gameState.witchPotions.save = false;
                    } else {
                        deaths.push(target);
                        addLog(`Ma Sói đã tấn công ${player.name}!`, 'night');
                    }
                } else {
                    addLog(`Bảo Vệ đã bảo vệ ${player.name}!`, 'night');
                }
            }

            // Witch kill
            if (actions.witchKill && gameState.witchPotions.kill) {
                const target = actions.witchKill;
                const player = gameState.players.find(p => p.id === target);
                deaths.push(target);
                addLog(`Phù Thủy đã đầu độc ${player.name}!`, 'night');
                gameState.witchPotions.kill = false;
            }

            // Apply deaths
            deaths.forEach(id => {
                const player = gameState.players.find(p => p.id === id);
                if (player && player.alive) {
                    player.alive = false;
                    gameState.alive = gameState.alive.filter(pId => pId !== id);
                    addLog(`${player.name} (${ROLES[player.role].name}) đã chết!`, 'death');
                }
            });

            gameState.guardLastProtect = actions.guard;
        }

        function updatePhaseDisplay() {
            const phaseDisplay = document.getElementById('phaseDisplay');
            const dayCounter = document.getElementById('dayCounter');

            if (gameState.phase === 'night') {
                phaseDisplay.textContent = '🌙 Đêm';
                phaseDisplay.className = 'phase-display night';
            } else {
                phaseDisplay.textContent = '☀️ Ngày';
                phaseDisplay.className = 'phase-display day';
            }

            dayCounter.textContent = `Ngày ${gameState.day}`;
        }

        function renderPlayers() {
            const grid = document.getElementById('playersGrid');
            grid.innerHTML = '';

            gameState.players.forEach(player => {
                const card = document.createElement('div');
                card.className = `player-card ${player.alive ? 'alive' : 'dead'}`;
                if (player.id === gameState.selectedTarget) {
                    card.classList.add('selected');
                }
                card.onclick = () => selectPlayer(player.id);

                card.innerHTML = `
                    <div class="player-status">${player.alive ? '' : '💀'}</div>
                    <div class="player-avatar">${player.avatar}</div>
                    <div class="player-name">${player.name}</div>
                    <div class="player-role">${player.alive ? '???' : ROLES[player.role].name}</div>
                `;

                grid.appendChild(card);
            });
        }

        function selectPlayer(playerId) {
            const player = gameState.players.find(p => p.id === playerId);
            if (!player.alive) return;

            gameState.selectedTarget = playerId;
            renderPlayers();
        }

        function updateActionPanel() {
            const title = document.getElementById('actionTitle');
            const buttons = document.getElementById('actionButtons');
            buttons.innerHTML = '';

            if (gameState.phase === 'night') {
                // Night actions based on role (simplified - in real game, each player sees their own actions)
                title.textContent = 'Hành động ban đêm';

                const werewolfBtn = document.createElement('button');
                werewolfBtn.className = 'btn btn-primary';
                werewolfBtn.textContent = '🐺 Ma Sói tấn công';
                werewolfBtn.onclick = () => performNightAction('werewolf');
                buttons.appendChild(werewolfBtn);

                const seerBtn = document.createElement('button');
                seerBtn.className = 'btn btn-secondary';
                seerBtn.textContent = '🔮 Tiên tri xem bài';
                seerBtn.onclick = () => performNightAction('seer');
                buttons.appendChild(seerBtn);

                const guardBtn = document.createElement('button');
                guardBtn.className = 'btn btn-secondary';
                guardBtn.textContent = '🛡️ Bảo vệ';
                guardBtn.onclick = () => performNightAction('guard');
                buttons.appendChild(guardBtn);

                const witchSaveBtn = document.createElement('button');
                witchSaveBtn.className = 'btn btn-secondary';
                witchSaveBtn.textContent = '🧙 Phù Thủy cứu';
                witchSaveBtn.disabled = !gameState.witchPotions.save;
                witchSaveBtn.onclick = () => performNightAction('witchSave');
                buttons.appendChild(witchSaveBtn);

                const witchKillBtn = document.createElement('button');
                witchKillBtn.className = 'btn btn-secondary';
                witchKillBtn.textContent = '🧙 Phù Thủy giết';
                witchKillBtn.disabled = !gameState.witchPotions.kill;
                witchKillBtn.onclick = () => performNightAction('witchKill');
                buttons.appendChild(witchKillBtn);

                const endNightBtn = document.createElement('button');
                endNightBtn.className = 'btn btn-primary';
                endNightBtn.textContent = '⏭️ Kết thúc đêm';
                endNightBtn.onclick = endNight;
                buttons.appendChild(endNightBtn);
            } else {
                // Day actions
                title.textContent = 'Bỏ phiếu';

                const voteBtn = document.createElement('button');
                voteBtn.className = 'btn btn-primary';
                voteBtn.textContent = '🗳️ Vote người chơi';
                voteBtn.onclick = () => performVote();
                buttons.appendChild(voteBtn);

                const skipBtn = document.createElement('button');
                skipBtn.className = 'btn btn-secondary';
                skipBtn.textContent = '⏭️ Skip vote';
                skipBtn.onclick = endDay;
                buttons.appendChild(skipBtn);
            }
        }

        function performNightAction(actionType) {
            if (!gameState.selectedTarget) {
                alert('Vui lòng chọn một người chơi!');
                return;
            }

            gameState.nightActions[actionType] = gameState.selectedTarget;
            
            const player = gameState.players.find(p => p.id === gameState.selectedTarget);
            addLog(`Đã chọn ${player.name} cho hành động ${actionType}`, 'night');
            
            gameState.selectedTarget = null;
            renderPlayers();
        }

        function endNight() {
            gameState.day++;
            startDay();
        }

        function performVote() {
            if (!gameState.selectedTarget) {
                alert('Vui lòng chọn một người chơi để vote!');
                return;
            }

            const player = gameState.players.find(p => p.id === gameState.selectedTarget);
            player.alive = false;
            gameState.alive = gameState.alive.filter(id => id !== player.id);

            addLog(`${player.name} đã bị vote ra! (${ROLES[player.role].name})`, 'death');

            // Hunter ability
            if (player.role === 'hunter') {
                alert('Thợ Săn có thể kéo theo 1 người!');
                // Simplified - in real game, hunter would choose
            }

            renderPlayers();

            if (!checkWinCondition()) {
                setTimeout(() => {
                    endDay();
                }, 2000);
            }
        }

        function endDay() {
            startNight();
        }

        function checkWinCondition() {
            const werewolvesAlive = gameState.players.filter(p => p.alive && p.team === 'werewolf').length;
            const villagersAlive = gameState.players.filter(p => p.alive && p.team === 'villager').length;

            if (werewolvesAlive === 0) {
                showGameOver('villager');
                return true;
            }

            if (werewolvesAlive >= villagersAlive) {
                showGameOver('werewolf');
                return true;
            }

            return false;
        }

        function showGameOver(winningTeam) {
            const modal = document.getElementById('gameOverModal');
            const title = document.getElementById('winnerTitle');
            const icon = document.getElementById('winnerIcon');
            const message = document.getElementById('winnerMessage');

            if (winningTeam === 'werewolf') {
                title.textContent = '🐺 Ma Sói chiến thắng!';
                icon.textContent = '🐺🐺';
                message.textContent = 'Ma Sói đã tiêu diệt tất cả dân làng!';
                addLog('Ma Sói chiến thắng!', 'win');
            } else {
                title.textContent = '🎉 Dân Làng chiến thắng!';
                icon.textContent = '👨‍🌾🎉';
                message.textContent = 'Tất cả Ma Sói đã bị tiêu diệt!';
                addLog('Dân Làng chiến thắng!', 'win');
            }

            modal.style.display = 'flex';
        }

        function resetGame() {
            document.getElementById('gameOverModal').style.display = 'none';
            document.getElementById('setupSection').style.display = 'block';
            document.getElementById('gameBoard').style.display = 'none';
            document.getElementById('gameLog').innerHTML = '';

            gameState = {
                players: [],
                roles: {},
                day: 1,
                phase: 'night',
                alive: [],
                selectedTarget: null,
                nightActions: {},
                witchPotions: { save: true, kill: true },
                guardLastProtect: null,
                log: []
            };

            initSetup();
        }

        function addLog(message, type = '') {
            const log = document.getElementById('gameLog');
            const entry = document.createElement('div');
            entry.className = 'log-entry';

            const time = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });

            entry.innerHTML = `
                <span class="log-time">${time}</span>
                <span class="log-message ${type}">${message}</span>
            `;

            log.insertBefore(entry, log.firstChild);
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function getRandomAvatar() {
            const avatars = ['👤', '🧑', '👨', '👩', '🧔', '👴', '👵', '🧒'];
            return avatars[Math.floor(Math.random() * avatars.length)];
        }

        // Initialize on load
        initSetup();
    </script>
</body>
</html>
